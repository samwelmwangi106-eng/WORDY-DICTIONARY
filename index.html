<!-- Html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📖 Wordly Dictionary</h1>

  <!-- SEARCH -->
  <form id="searchForm">
    <input type="text" id="wordInput" placeholder="Enter a word..." required>
    <button type="submit">Search</button>
  </form>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- SAVED WORDS -->
  <h3>⭐ Saved Words</h3>
  <ul id="savedWords"></ul>

</div>

<script src="./index.js"></script>
</body>
</html>
